<!-- post.html -->

<article class="post-container">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
  </header>

  <!-- Abstract Box -->
  {% if page.abstract %}
  <section class="abstract-box">
    <h2>Abstract</h2>
    <p>{{ page.abstract }}</p>
  </section>
  {% endif %}

  <!-- Main Content Box -->
  <section class="content-box">
    {{ content }}
  </section>
</article>
